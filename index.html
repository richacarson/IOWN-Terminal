<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c0a">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<title>IOWN Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=EB+Garamond:wght@400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#080c0a;--card:#0f1612;--card2:#141e18;--sidebar:#0a0f0c;
--border:#1a2b20;--border2:#243a2c;
--green:#4ade80;--greenDim:#1a4d2e;--greenDk:#3D4A2E;--greenMid:#5A6B42;
--red:#f87171;--redDim:#4c1111;--gold:#fbbf24;--goldDim:#5c4a0e;
--blue:#60a5fa;--blueDim:#1e3a5f;
--text:#dce8de;--muted:#7a9480;--dim:#4a6050;--white:#f0f7f1;
--mono:'DM Mono',monospace;--serif:'Playfair Display',Georgia,serif;--body:'EB Garamond',Georgia,serif;
}
body{font-family:var(--body);background:var(--bg);color:var(--text);overflow:hidden;height:100vh;height:100dvh}
input,button,select{font-family:var(--mono)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
a{color:var(--green);text-decoration:none}a:hover{text-decoration:underline}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--sidebar);flex-shrink:0;gap:8px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,var(--greenMid),var(--greenDk));display:flex;align-items:center;justify-content:center;font:700 12px var(--mono);color:var(--white);letter-spacing:.05em}
.logo-text{font:700 16px var(--serif);letter-spacing:.02em}
.logo-tag{font:400 9px var(--mono);color:var(--muted);letter-spacing:.15em;text-transform:uppercase}
.nav{display:flex;gap:1px;background:var(--card);border-radius:6px;padding:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}
.nav-btn{padding:6px 11px;border-radius:4px;border:none;background:transparent;color:var(--muted);cursor:pointer;font:400 11px var(--mono);transition:all .2s;white-space:nowrap}
.nav-btn.active{background:var(--greenDk);color:var(--green);font-weight:600}
.hdr-right{display:flex;align-items:center;gap:10px}
.clock{font:400 11px var(--mono);color:var(--dim);text-align:right;line-height:1.3}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.cfg-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:4px 8px;color:var(--muted);cursor:pointer;font:400 10px var(--mono)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:16px}

/* CARDS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:900px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .2s}
.stat-card.active{border-color:var(--greenDim)}
.stat-label{font:400 9px var(--mono);color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.stat-val{font:700 22px var(--mono)}
.stat-sub{font:400 10px var(--mono);color:var(--muted);margin-top:3px}

/* TABLE */
.tbl-wrap{border-radius:8px;border:1px solid var(--border);overflow-x:auto;background:var(--card);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 10px;font:400 9px var(--mono);color:var(--muted);letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--border);font:400 12px var(--mono);white-space:nowrap}
tr.row:hover{background:var(--card2)}
tr.row{cursor:pointer;transition:background .15s}
.tk{font-weight:700;color:var(--green);font-size:13px}
.co{font-size:9px;color:var(--dim);font-weight:400}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:8px;letter-spacing:.05em}
.badge-sector{background:rgba(61,74,46,.4);color:var(--muted)}
.badge-div{background:var(--greenDim);color:var(--green)}
.badge-grw{background:var(--goldDim);color:var(--gold)}
.badge-dgt{background:var(--blueDim);color:var(--blue)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search{flex:1;min-width:180px;max-width:280px;padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;outline:none}
.filter-btn{padding:5px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:10px;transition:all .15s}
.filter-btn.active{border-color:var(--greenDim);background:var(--greenDk);color:var(--green)}
.btn{padding:7px 16px;border-radius:6px;border:none;background:linear-gradient(135deg,var(--greenMid),var(--greenDk));color:var(--white);cursor:pointer;font:600 12px var(--mono);letter-spacing:.03em}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-sm{padding:5px 10px;font-size:10px}
.btn-danger{border-color:var(--redDim);color:var(--red)}

/* DETAIL PANEL */
.detail{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px}
.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
@media(max-width:700px){.detail-grid{grid-template-columns:repeat(2,1fr)}}
.metric{text-align:center}
.metric-label{font:400 8px var(--mono);color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.metric-val{font:600 15px var(--mono)}

/* TABS inside detail */
.dtabs{display:flex;gap:1px;margin:14px 0 10px;border-bottom:1px solid var(--border)}
.dtab{padding:6px 14px;font:400 11px var(--mono);color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.dtab.active{color:var(--green);border-bottom-color:var(--green)}

/* NEWS CARDS */
.news-card{display:block;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:12px;margin-bottom:8px;transition:border .2s;cursor:pointer}
.news-card:hover{border-color:var(--greenDim);text-decoration:none}
.news-title{font:600 14px var(--body);color:var(--text);margin-bottom:3px}
.news-summary{font:400 11px var(--body);color:var(--muted);line-height:1.4}
.news-meta{font:400 9px var(--mono);color:var(--dim);margin-top:5px}

/* SCREENER */
.screener-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.screener-filters select,.screener-filters input{padding:6px 10px;border-radius:5px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:11px;outline:none}

/* SIGNAL ROWS */
.sig-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--border)}
.sig-badge{padding:2px 7px;border-radius:3px;font:700 9px var(--mono);letter-spacing:.08em}

/* AI */
.ai-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px}
.ai-input{width:100%;padding:10px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font:400 13px var(--body);outline:none}
.ai-resp{margin-top:12px;padding:12px;border-radius:7px;background:var(--bg);border:1px solid var(--border);font:400 13px var(--body);line-height:1.7;white-space:pre-wrap;max-height:400px;overflow:auto}

/* CONFIG PANEL */
.config{position:fixed;top:0;right:0;width:340px;height:100vh;background:var(--sidebar);border-left:1px solid var(--border);padding:16px;z-index:1000;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.6)}
.config-section{padding:12px;background:var(--bg);border-radius:6px;border:1px solid var(--border);margin-bottom:12px}

/* PROGRESS BAR */
.progress-bar{height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;background:var(--green);transition:width .3s}

/* SECTOR GRID */
.sector-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:700px){.sector-grid{grid-template-columns:1fr}}

/* FOOTER */
.ftr{padding:8px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font:400 9px var(--mono);color:var(--dim);background:var(--sidebar);flex-shrink:0}

/* SPARKLINE */
.spark{display:block}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto}

/* UP/DOWN colors */
.up{color:var(--green)}.dn{color:var(--red)}.gold{color:var(--gold)}.blue{color:var(--blue)}
.green{color:var(--green)}.red{color:var(--red)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef,memo} = React;

// ════════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════════
const API_KEY = "d6i8f0pr01ql9cifbr3gd6i8f0pr01ql9cifbr40";
const FH = "https://finnhub.io/api/v1";

const DEFAULT_DIVIDEND = ["A","ABT","ADI","ADP","ATO","BKH","CAT","CHD","CL","DGX","FAST","GD","GPC","LMT","LRCX","MATX","NEE","ORI","PCAR","QCOM","SSNC","STLD","SYK","TEL","VLO"];
const DEFAULT_GROWTH = ["AEM","AMD","ATAT","CNX","COIN","CVX","CWAN","EIX","FINV","FTNT","GFI","HOOD","HRMY","HUT","KEYS","MARA","NVDA","NXPI","OKE","PDD","SUPV","SYF","TOL","TSM"];
const DEFAULT_DIGITAL = ["IBIT","ETHA"];

const SECTOR_MAP = {
  A:"Health Care",ABT:"Health Care",ADI:"Info Tech",ADP:"Industrials",ATO:"Utilities",
  BKH:"Utilities",CAT:"Industrials",CHD:"Consumer Staples",CL:"Consumer Staples",DGX:"Health Care",
  FAST:"Industrials",GD:"Industrials",GPC:"Consumer Disc.",LMT:"Industrials",LRCX:"Info Tech",
  MATX:"Industrials",NEE:"Utilities",ORI:"Financials",PCAR:"Industrials",QCOM:"Info Tech",
  SSNC:"Info Tech",STLD:"Materials",SYK:"Health Care",TEL:"Info Tech",VLO:"Energy",
  AEM:"Materials",AMD:"Info Tech",ATAT:"Consumer Disc.",CNX:"Energy",COIN:"Financials",
  CVX:"Energy",CWAN:"Info Tech",EIX:"Utilities",FINV:"Financials",FTNT:"Info Tech",
  GFI:"Materials",HOOD:"Financials",HRMY:"Health Care",HUT:"Info Tech",KEYS:"Info Tech",
  MARA:"Info Tech",NVDA:"Info Tech",NXPI:"Info Tech",OKE:"Energy",PDD:"Consumer Disc.",
  SUPV:"Financials",SYF:"Financials",TOL:"Consumer Disc.",TSM:"Info Tech",
  IBIT:"Digital Assets",ETHA:"Digital Assets"
};
const NAMES = {
  A:"Agilent Technologies",ABT:"Abbott Laboratories",ADI:"Analog Devices",ADP:"Automatic Data Processing",
  ATO:"Atmos Energy",BKH:"Black Hills Corp",CAT:"Caterpillar",CHD:"Church & Dwight",CL:"Colgate-Palmolive",
  DGX:"Quest Diagnostics",FAST:"Fastenal",GD:"General Dynamics",GPC:"Genuine Parts",LMT:"Lockheed Martin",
  LRCX:"Lam Research",MATX:"Matson",NEE:"NextEra Energy",ORI:"Old Republic Int'l",PCAR:"PACCAR",
  QCOM:"Qualcomm",SSNC:"SS&C Technologies",STLD:"Steel Dynamics",SYK:"Stryker",TEL:"TE Connectivity",
  VLO:"Valero Energy",AEM:"Agnico Eagle Mines",AMD:"Advanced Micro Devices",ATAT:"Atour Lifestyle",
  CNX:"CNX Resources",COIN:"Coinbase Global",CVX:"Chevron",CWAN:"Clearwater Analytics",
  EIX:"Edison International",FINV:"FinVolution Group",FTNT:"Fortinet",GFI:"Gold Fields",
  HOOD:"Robinhood Markets",HRMY:"Harmony Biosciences",HUT:"Hut 8 Corp",KEYS:"Keysight Technologies",
  MARA:"MARA Holdings",NVDA:"NVIDIA",NXPI:"NXP Semiconductors",OKE:"ONEOK",PDD:"PDD Holdings",
  SUPV:"Grupo Supervielle",SYF:"Synchrony Financial",TOL:"Toll Brothers",TSM:"Taiwan Semiconductor",
  IBIT:"iShares Bitcoin Trust",ETHA:"iShares Ethereum Trust"
};

// ════════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════════
const fmt = (n,d=2) => n!=null&&isFinite(n)?Number(n).toFixed(d):"—";
const fmtPct = n => n!=null&&isFinite(n)?(n>=0?"+":"")+Number(n).toFixed(2)+"%":"—";
const fmtVol = n => {if(!n)return"—";if(n>=1e9)return(n/1e9).toFixed(1)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(0)+"K";return n+""};
const fmtMC = n => {if(!n||n===0)return"—";if(n>=1e6)return"$"+(n/1e3).toFixed(0)+"B";if(n>=1e3)return"$"+n.toFixed(0)+"M";return"$"+n.toFixed(0)+"M"};
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const clx = (...c) => c.filter(Boolean).join(" ");
const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem("iown_"+k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem("iown_"+k,JSON.stringify(v))}catch{}}
};

// ════════════════════════════════════════════════════════════════
// SPARKLINE
// ════════════════════════════════════════════════════════════════
const Spark = memo(({data,w=70,h=22,color})=>{
  if(!data||data.length<2)return <span style={{color:"var(--dim)",fontSize:9}}>—</span>;
  const mn=Math.min(...data),mx=Math.max(...data),r=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/r)*(h-4)-2}`).join(" ");
  return <svg className="spark" width={w} height={h}><polyline fill="none" stroke={color} strokeWidth="1.5" points={pts}/></svg>;
});

// ════════════════════════════════════════════════════════════════
// MAIN APP
// ════════════════════════════════════════════════════════════════
function App(){
  // ── STATE ──
  const [view,setView]=useState("portfolio");
  const [filter,setFilter]=useState("all");
  const [selected,setSelected]=useState(null);
  const [detailTab,setDetailTab]=useState("overview");
  const [search,setSearch]=useState("");
  const [sortKey,setSortKey]=useState("ticker");
  const [sortDir,setSortDir]=useState("asc");
  const [clock,setClock]=useState(new Date());
  const [showConfig,setShowConfig]=useState(false);

  // Data stores
  const [quotes,setQuotes]=useState(LS.get("quotes",{}));
  const [metrics,setMetrics]=useState(LS.get("metrics",{}));
  const [profiles,setProfiles]=useState(LS.get("profiles",{}));
  const [candles,setCandles]=useState(LS.get("candles",{}));
  const [stockNews,setStockNews]=useState({});
  const [marketNews,setMarketNews]=useState([]);
  const [earnings,setEarnings]=useState({});
  const [peers,setPeers]=useState({});
  const [recs,setRecs]=useState({});

  // Portfolio management
  const [divTickers,setDivTickers]=useState(LS.get("div_tickers",DEFAULT_DIVIDEND));
  const [grwTickers,setGrwTickers]=useState(LS.get("grw_tickers",DEFAULT_GROWTH));
  const [dgtTickers,setDgtTickers]=useState(LS.get("dgt_tickers",DEFAULT_DIGITAL));
  const allTickers=useMemo(()=>[...divTickers,...grwTickers,...dgtTickers],[divTickers,grwTickers,dgtTickers]);

  // Screener
  const [screenSearch,setScreenSearch]=useState("");
  const [screenResults,setScreenResults]=useState([]);
  const [screenData,setScreenData]=useState({});

  // Loading
  const [loading,setLoading]=useState(false);
  const [fetchMsg,setFetchMsg]=useState("");
  const [fetchPct,setFetchPct]=useState(0);
  const [lastRefresh,setLastRefresh]=useState(LS.get("lastRefresh",null));

  // AI
  const [aiQuery,setAiQuery]=useState("");
  const [aiResp,setAiResp]=useState("");
  const [aiLoading,setAiLoading]=useState(false);

  // Add stock modal
  const [showAddModal,setShowAddModal]=useState(false);
  const [addTicker,setAddTicker]=useState("");
  const [addPortfolio,setAddPortfolio]=useState("growth");

  const abortRef=useRef(false);

  // ── PERSIST PORTFOLIOS ──
  useEffect(()=>{LS.set("div_tickers",divTickers)},[divTickers]);
  useEffect(()=>{LS.set("grw_tickers",grwTickers)},[grwTickers]);
  useEffect(()=>{LS.set("dgt_tickers",dgtTickers)},[dgtTickers]);

  // ── CLOCK ──
  useEffect(()=>{const t=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(t)},[]);

  // ── FINNHUB API ──
  const fhFetch=useCallback(async(ep,params={})=>{
    const url=new URL(FH+ep);url.searchParams.set("token",API_KEY);
    Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,String(v)));
    try{const r=await fetch(url);if(r.status===429)return"RATE_LIMITED";if(!r.ok)return null;return await r.json()}catch{return null}
  },[]);

  // ── DATA PERSISTENCE ──
  useEffect(()=>{if(Object.keys(quotes).length)LS.set("quotes",quotes)},[quotes]);
  useEffect(()=>{if(Object.keys(metrics).length)LS.set("metrics",metrics)},[metrics]);
  useEffect(()=>{if(Object.keys(profiles).length)LS.set("profiles",profiles)},[profiles]);
  useEffect(()=>{if(Object.keys(candles).length)LS.set("candles",candles)},[candles]);

  // ── FETCH ALL DATA ──
  const fetchAll=useCallback(async(quickOnly=false)=>{
    if(loading)return;
    abortRef.current=false;
    setLoading(true);
    const tks=allTickers;
    const nq={...quotes},nm={...metrics},nc={...candles},np={...profiles};
    
    // Phase 1: Quotes
    for(let i=0;i<tks.length;i++){
      if(abortRef.current)break;
      const t=tks[i];
      setFetchPct(Math.round((i/tks.length)*(quickOnly?100:40)));
      setFetchMsg(`Quotes: ${t} (${i+1}/${tks.length})`);
      const d=await fhFetch("/quote",{symbol:t});
      if(d==="RATE_LIMITED"){setFetchMsg("Rate limited — pausing 60s...");await sleep(62000);i--;continue}
      if(d&&d.c)nq[t]=d;
      await sleep(1050);
    }
    setQuotes({...nq});
    
    if(!quickOnly){
      // Phase 2: Metrics
      for(let i=0;i<tks.length;i++){
        if(abortRef.current)break;
        const t=tks[i];
        setFetchPct(40+Math.round((i/tks.length)*30));
        setFetchMsg(`Fundamentals: ${t} (${i+1}/${tks.length})`);
        const d=await fhFetch("/stock/metric",{symbol:t,metric:"all"});
        if(d==="RATE_LIMITED"){setFetchMsg("Rate limited — pausing 60s...");await sleep(62000);i--;continue}
        if(d&&d.metric)nm[t]=d.metric;
        await sleep(1050);
      }
      setMetrics({...nm});
      
      // Phase 3: Candles
      const now=Math.floor(Date.now()/1000),from=now-90*86400;
      for(let i=0;i<tks.length;i++){
        if(abortRef.current)break;
        const t=tks[i];
        setFetchPct(70+Math.round((i/tks.length)*20));
        setFetchMsg(`Charts: ${t} (${i+1}/${tks.length})`);
        const d=await fhFetch("/stock/candle",{symbol:t,resolution:"D",from,to:now});
        if(d==="RATE_LIMITED"){setFetchMsg("Rate limited — pausing 60s...");await sleep(62000);i--;continue}
        if(d&&d.c&&d.s!=="no_data")nc[t]=d.c;
        await sleep(1050);
      }
      setCandles({...nc});
      
      // Phase 4: Profiles (only missing)
      const needProfile=tks.filter(t=>!np[t]);
      for(let i=0;i<needProfile.length;i++){
        if(abortRef.current)break;
        const t=needProfile[i];
        setFetchPct(90+Math.round((i/needProfile.length)*10));
        setFetchMsg(`Profiles: ${t} (${i+1}/${needProfile.length})`);
        const d=await fhFetch("/stock/profile2",{symbol:t});
        if(d==="RATE_LIMITED"){setFetchMsg("Rate limited — pausing 60s...");await sleep(62000);i--;continue}
        if(d&&d.name)np[t]=d;
        await sleep(1050);
      }
      setProfiles({...np});
    }
    
    const now2=new Date().toISOString();
    setLastRefresh(now2);LS.set("lastRefresh",now2);
    setFetchPct(100);setFetchMsg("Complete");setLoading(false);
  },[loading,allTickers,quotes,metrics,candles,profiles,fhFetch]);

  // ── FETCH STOCK DETAIL ──
  const fetchStockDetail=useCallback(async(t)=>{
    // News
    const today=new Date().toISOString().split("T")[0];
    const monthAgo=new Date(Date.now()-30*86400000).toISOString().split("T")[0];
    const n=await fhFetch("/company-news",{symbol:t,from:monthAgo,to:today});
    if(n&&Array.isArray(n))setStockNews(prev=>({...prev,[t]:n.slice(0,15)}));
    await sleep(1100);
    // Earnings
    const e=await fhFetch("/stock/earnings",{symbol:t,limit:8});
    if(e&&Array.isArray(e))setEarnings(prev=>({...prev,[t]:e}));
    await sleep(1100);
    // Peers
    const p=await fhFetch("/company-peers",{symbol:t});
    if(p&&Array.isArray(p))setPeers(prev=>({...prev,[t]:p.filter(x=>x!==t).slice(0,8)}));
    await sleep(1100);
    // Recommendations
    const r=await fhFetch("/stock/recommendation",{symbol:t});
    if(r&&Array.isArray(r))setRecs(prev=>({...prev,[t]:r.slice(0,6)}));
  },[fhFetch]);

  // ── FETCH MARKET NEWS ──
  const fetchMarketNews=useCallback(async()=>{
    const d=await fhFetch("/news",{category:"general"});
    if(d&&Array.isArray(d))setMarketNews(d.slice(0,30));
  },[fhFetch]);

  // ── SCREENER SEARCH ──
  const handleScreenerSearch=useCallback(async()=>{
    if(!screenSearch.trim())return;
    const d=await fhFetch("/search",{q:screenSearch.trim()});
    if(d&&d.result)setScreenResults(d.result.filter(r=>r.type==="Common Stock").slice(0,20));
  },[screenSearch,fhFetch]);

  const fetchScreenerQuote=useCallback(async(t)=>{
    const [q,m]=await Promise.all([
      fhFetch("/quote",{symbol:t}),
      fhFetch("/stock/metric",{symbol:t,metric:"all"})
    ]);
    setScreenData(prev=>({...prev,[t]:{quote:q,metric:m?.metric||{}}}));
  },[fhFetch]);

  // ── AUTO-LOAD + AUTO-REFRESH ──
  useEffect(()=>{
    // Only auto-fetch if we have no cached data at all
    if(Object.keys(quotes).length===0&&!loading){
      setTimeout(()=>fetchAll(true),1000);
    }
  },[]);

  // Background auto-refresh
  useEffect(()=>{
    const getRefreshInterval=()=>{
      const now=new Date();
      const day=now.getDay(); // 0=Sun,6=Sat
      const h=now.getHours(),m=now.getMinutes();
      const mins=h*60+m;
      // Market hours: Mon-Fri 9:30 AM - 4:00 PM ET
      // We'll use a rough check — during weekday daytime, refresh more often
      const isWeekday=day>=1&&day<=5;
      const isMarketHours=isWeekday&&mins>=570&&mins<=960; // 9:30-16:00
      return isMarketHours?5*60*1000:30*60*1000; // 5 min vs 30 min
    };

    let timer=null;
    const scheduleRefresh=()=>{
      const interval=getRefreshInterval();
      timer=setTimeout(async()=>{
        if(!loading&&Object.keys(quotes).length>0){
          // Silent background refresh — quotes only
          const tks=allTickers;
          const nq={...quotes};
          for(let i=0;i<tks.length;i++){
            const t=tks[i];
            try{
              const url=new URL(FH+"/quote");
              url.searchParams.set("token",API_KEY);
              url.searchParams.set("symbol",t);
              const r=await fetch(url);
              if(r.status===429){await sleep(62000);i--;continue}
              if(r.ok){const d=await r.json();if(d&&d.c)nq[t]=d}
            }catch{}
            await sleep(1050);
          }
          setQuotes({...nq});
          const ts=new Date().toISOString();
          setLastRefresh(ts);LS.set("lastRefresh",ts);
        }
        scheduleRefresh(); // reschedule
      },interval);
    };

    // Start auto-refresh after initial load completes
    const startDelay=setTimeout(()=>scheduleRefresh(),10000);

    return()=>{clearTimeout(timer);clearTimeout(startDelay)};
  },[allTickers]);

  // When selecting a stock, fetch its detail
  useEffect(()=>{
    if(selected){
      setDetailTab("overview");
      if(!stockNews[selected])fetchStockDetail(selected);
    }
  },[selected]);

  // ── BUILD STOCK DATA ──
  const getPortfolio=useCallback(t=>{
    if(divTickers.includes(t))return"Dividend";
    if(grwTickers.includes(t))return"Growth";
    if(dgtTickers.includes(t))return"Digital Assets";
    return"Watchlist";
  },[divTickers,grwTickers,dgtTickers]);

  const stockData=useMemo(()=>{
    const data={};
    allTickers.forEach(t=>{
      const q=quotes[t]||{},m=metrics[t]||{},p=profiles[t]||{};
      const hasData=q.c&&q.c>0;
      data[t]={
        ticker:t,name:NAMES[t]||p.name||t,sector:SECTOR_MAP[t]||p.finnhubIndustry||"Other",
        portfolio:getPortfolio(t),
        price:q.c||0,open:q.o||0,high:q.h||0,low:q.l||0,
        prevClose:q.pc||0,change:q.d||0,changePct:q.dp||0,
        volume:m["10DayAverageTradingVolume"]?m["10DayAverageTradingVolume"]*1e6:0,
        fiftyTwoHigh:m["52WeekHigh"]||0,fiftyTwoLow:m["52WeekLow"]||0,
        pe:m["peBasicExclExtraTTM"]||m["peTTM"]||0,
        divYield:m["dividendYieldIndicatedAnnual"]||m["currentDividendYieldTTM"]||0,
        marketCap:m["marketCapitalization"]||0,
        beta:m["beta"]||0,epsAnnual:m["epsAnnual"]||0,
        revenuePerShare:m["revenuePerShareAnnual"]||0,
        roe:m["roeTTM"]||0,roa:m["roaTTM"]||0,
        debtEquity:m["totalDebt/totalEquityQuarterly"]||0,
        currentRatio:m["currentRatioQuarterly"]||0,
        grossMargin:m["grossMarginTTM"]||0,
        netMargin:m["netProfitMarginTTM"]||0,
        sma200:m["200DayMovingAverage"]||0,
        sma50:m["50DayMovingAverage"]||0,
        aboveSMA200:hasData&&m["200DayMovingAverage"]?q.c>m["200DayMovingAverage"]:null,
        distFromHigh:hasData&&m["52WeekHigh"]?((q.c-m["52WeekHigh"])/m["52WeekHigh"])*100:null,
        distFromLow:hasData&&m["52WeekLow"]?((q.c-m["52WeekLow"])/m["52WeekLow"])*100:null,
        sparkline:candles[t]||null,
        logo:p.logo||"",weburl:p.weburl||"",country:p.country||"",exchange:p.exchange||"",ipo:p.ipo||"",
        hasData
      };
    });
    return data;
  },[allTickers,quotes,metrics,candles,profiles,getPortfolio]);

  // ── FILTERED + SORTED ──
  const filtered=useMemo(()=>{
    let tks=[...allTickers];
    if(filter==="dividend")tks=tks.filter(t=>divTickers.includes(t));
    if(filter==="growth")tks=tks.filter(t=>grwTickers.includes(t));
    if(filter==="digital")tks=tks.filter(t=>dgtTickers.includes(t));
    if(search){
      const q=search.toLowerCase();
      tks=tks.filter(t=>t.toLowerCase().includes(q)||(stockData[t]?.name||"").toLowerCase().includes(q)||(stockData[t]?.sector||"").toLowerCase().includes(q));
    }
    return tks.sort((a,b)=>{
      const da=stockData[a]||{},db=stockData[b]||{};
      let va,vb;
      switch(sortKey){
        case"price":va=da.price;vb=db.price;break;
        case"change":va=da.changePct;vb=db.changePct;break;
        case"pe":va=da.pe;vb=db.pe;break;
        case"yield":va=da.divYield;vb=db.divYield;break;
        case"mktcap":va=da.marketCap;vb=db.marketCap;break;
        case"sector":return sortDir==="asc"?(da.sector||"").localeCompare(db.sector||""):(db.sector||"").localeCompare(da.sector||"");
        default:return sortDir==="asc"?a.localeCompare(b):b.localeCompare(a);
      }
      return sortDir==="asc"?(va||0)-(vb||0):(vb||0)-(va||0);
    });
  },[allTickers,divTickers,grwTickers,dgtTickers,filter,search,sortKey,sortDir,stockData]);

  const handleSort=k=>{if(sortKey===k)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortKey(k);setSortDir("desc")}};

  // ── PORTFOLIO STATS ──
  const calcStats=tks=>{
    const d=tks.map(t=>stockData[t]).filter(x=>x&&x.hasData);
    if(!d.length)return{avgChg:0,gainers:0,losers:0,above200:0,total:tks.length,loaded:0};
    return{avgChg:d.reduce((s,x)=>s+x.changePct,0)/d.length,gainers:d.filter(x=>x.changePct>0).length,losers:d.filter(x=>x.changePct<0).length,above200:d.filter(x=>x.aboveSMA200===true).length,total:tks.length,loaded:d.length};
  };

  // ── TACTICAL SIGNALS ──
  const signals=useMemo(()=>{
    const s=[];
    allTickers.forEach(t=>{
      const d=stockData[t];if(!d||!d.hasData)return;
      if(d.aboveSMA200===true&&d.distFromLow!=null&&d.distFromLow>=25)
        s.push({ticker:t,type:"TRIM",reason:`Above 200DMA, +${fmt(d.distFromLow,0)}% from 52w low`});
      if(d.distFromHigh!=null&&d.distFromHigh<=-20){
        const tr=d.distFromHigh<=-30?"3rd":d.distFromHigh<=-25?"2nd":"1st";
        s.push({ticker:t,type:"BUY",reason:`${fmt(d.distFromHigh,0)}% from 52w high — ${tr} tranche`});
      }
      if(d.aboveSMA200===false)
        s.push({ticker:t,type:"WATCH",reason:`Below 200DMA ($${fmt(d.sma200,0)} vs $${fmt(d.price,0)})`});
    });
    return s.sort((a,b)=>({BUY:0,TRIM:1,WATCH:2}[a.type]||3)-({BUY:0,TRIM:1,WATCH:2}[b.type]||3));
  },[allTickers,stockData]);

  // ── ADD/REMOVE STOCK ──
  const addStock=(ticker,port)=>{
    const t=ticker.toUpperCase().trim();if(!t)return;
    // Remove from any existing portfolio first
    setDivTickers(p=>p.filter(x=>x!==t));
    setGrwTickers(p=>p.filter(x=>x!==t));
    setDgtTickers(p=>p.filter(x=>x!==t));
    if(port==="dividend")setDivTickers(p=>[...p,t]);
    else if(port==="growth")setGrwTickers(p=>[...p,t]);
    else if(port==="digital")setDgtTickers(p=>[...p,t]);
  };
  const removeStock=t=>{
    setDivTickers(p=>p.filter(x=>x!==t));
    setGrwTickers(p=>p.filter(x=>x!==t));
    setDgtTickers(p=>p.filter(x=>x!==t));
  };

  // ── AI ──
  const handleAI=async()=>{
    if(!aiQuery.trim())return;
    setAiLoading(true);setAiResp("");
    try{
      const ctx=allTickers.filter(t=>stockData[t]?.hasData).slice(0,30).map(t=>{
        const d=stockData[t];
        return`${t} ($${fmt(d.price)}) ${fmtPct(d.changePct)} P/E:${fmt(d.pe,1)} Yield:${fmt(d.divYield,1)}% 200DMA:${d.aboveSMA200?"above":"below"} From52H:${fmt(d.distFromHigh,0)}%`;
      }).join("\n");
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:1500,
          system:`You are a research analyst for IOWN (Intentional Ownership), an RIA managing ~$516M focused on "Return on Intention" — 100+ year family legacy building through values-aligned investing. Portfolio: ${divTickers.length} dividend, ${grwTickers.length} growth, ${dgtTickers.length} digital asset ETFs. Framework: Think Like an Owner (Innovation/Inspiration/Infrastructure), Simplicity Over Complexity, Research Reveals Opportunities, Avoid Erosion. Tactical: trim above 200DMA +25% from lows, deploy in 3 tranches at -20%/-25%/-30% drawdowns. Be concise, analytical, and actionable.`,
          messages:[{role:"user",content:`Live portfolio:\n${ctx}\n\n${aiQuery}`}],
          tools:[{type:"web_search_20250305",name:"web_search"}]
        })
      });
      const data=await r.json();
      setAiResp(data.content?.map(i=>i.type==="text"?i.text:"").filter(Boolean).join("\n")||"No response.");
    }catch(e){setAiResp("Error: "+e.message)}
    setAiLoading(false);
  };

  // ════════════════════════════════════════════════════════════
  // RENDER HELPERS
  // ════════════════════════════════════════════════════════════
  const portfolioBadge=p=>{
    if(p==="Dividend")return<span className="badge badge-div">DIV</span>;
    if(p==="Growth")return<span className="badge badge-grw">GRW</span>;
    if(p==="Digital Assets")return<span className="badge badge-dgt">DGTL</span>;
    return<span className="badge badge-sector">{p}</span>;
  };

  const hasData=Object.keys(quotes).length>0;

  // ════════════════════════════════════════════════════════════
  // STOCK DETAIL VIEW
  // ════════════════════════════════════════════════════════════
  const renderDetail=()=>{
    if(!selected)return null;
    const d=stockData[selected]||{};
    const sn=stockNews[selected]||[];
    const ea=earnings[selected]||[];
    const pr=peers[selected]||[];
    const rc=recs[selected]||[];
    
    return(
    <div className="detail">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:24,fontWeight:700,color:"var(--green)",fontFamily:"var(--serif)"}}>{d.ticker}</span>
            <span style={{fontSize:14,color:"var(--muted)"}}>{d.name}</span>
            <span className="badge badge-sector">{d.sector}</span>
            {portfolioBadge(d.portfolio)}
          </div>
          {d.hasData?(
            <div style={{display:"flex",alignItems:"baseline",gap:12,marginTop:8}}>
              <span style={{fontSize:30,fontWeight:700,fontFamily:"var(--mono)"}}>${fmt(d.price)}</span>
              <span className={d.changePct>=0?"up":"dn"} style={{fontSize:15,fontWeight:600,fontFamily:"var(--mono)"}}>
                {d.change>=0?"+":""}{fmt(d.change)} ({fmtPct(d.changePct)})
              </span>
            </div>
          ):<div style={{fontSize:13,color:"var(--dim)",fontFamily:"var(--mono)",marginTop:8}}>Loading data...</div>}
        </div>
        <div style={{display:"flex",gap:6}}>
          <button className="btn-outline btn-sm btn-danger" onClick={()=>{removeStock(selected);setSelected(null)}}>Remove</button>
          <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:16}}>✕</button>
        </div>
      </div>
      
      {d.sparkline&&<div style={{marginTop:12}}><Spark data={d.sparkline} w={Math.min(600,window.innerWidth-80)} h={50} color={d.changePct>=0?"var(--green)":"var(--red)"}/></div>}
      
      {/* DETAIL TABS */}
      <div className="dtabs">
        {["overview","news","earnings","peers","recs"].map(tab=>(
          <div key={tab} className={clx("dtab",detailTab===tab&&"active")} onClick={()=>setDetailTab(tab)}>
            {tab==="recs"?"Analyst":tab.charAt(0).toUpperCase()+tab.slice(1)}
          </div>
        ))}
      </div>
      
      {detailTab==="overview"&&d.hasData&&(
        <div className="detail-grid">
          {[
            ["Prev Close","$"+fmt(d.prevClose)],
            ["Day Range",`$${fmt(d.low)}–$${fmt(d.high)}`],
            ["52W Range",`$${fmt(d.fiftyTwoLow)}–$${fmt(d.fiftyTwoHigh)}`],
            ["Volume (10D)",fmtVol(d.volume)],
            ["P/E Ratio",fmt(d.pe,1)],
            ["EPS (Annual)",fmt(d.epsAnnual,2)],
            ["Div Yield",fmt(d.divYield,2)+"%",d.divYield>2?"var(--gold)":null],
            ["Mkt Cap",fmtMC(d.marketCap)],
            ["Beta",fmt(d.beta,2)],
            ["ROE",fmt(d.roe,1)+"%"],
            ["Gross Margin",fmt(d.grossMargin,1)+"%"],
            ["Net Margin",fmt(d.netMargin,1)+"%"],
            ["D/E Ratio",fmt(d.debtEquity,2)],
            ["Current Ratio",fmt(d.currentRatio,2)],
            ["200 DMA","$"+fmt(d.sma200),d.aboveSMA200?"var(--green)":"var(--red)"],
            ["50 DMA","$"+fmt(d.sma50)],
            ["From 52W High",fmtPct(d.distFromHigh),d.distFromHigh>-10?"var(--green)":d.distFromHigh>-20?"var(--gold)":"var(--red)"],
            ["From 52W Low",fmtPct(d.distFromLow),d.distFromLow>25?"var(--gold)":"var(--green)"],
          ].map(([label,val,color],i)=>(
            <div key={i} className="metric">
              <div className="metric-label">{label}</div>
              <div className="metric-val" style={color?{color}:{}}>{val}</div>
            </div>
          ))}
        </div>
      )}
      
      {detailTab==="news"&&(
        <div>
          {sn.length===0&&<div style={{color:"var(--dim)",fontSize:12,padding:20,textAlign:"center"}}>Loading news...</div>}
          {sn.map((n,i)=>(
            <a key={i} href={n.url} target="_blank" rel="noreferrer" className="news-card">
              <div className="news-title">{n.headline}</div>
              <div className="news-summary">{n.summary?.slice(0,180)}...</div>
              <div className="news-meta">{n.source} · {new Date(n.datetime*1000).toLocaleDateString()}</div>
            </a>
          ))}
        </div>
      )}
      
      {detailTab==="earnings"&&(
        <div>
          {ea.length===0&&<div style={{color:"var(--dim)",fontSize:12,padding:20,textAlign:"center"}}>Loading earnings...</div>}
          {ea.length>0&&(
            <div className="tbl-wrap" style={{marginTop:4}}>
              <table><thead><tr>
                <th>Period</th><th>Actual</th><th>Estimate</th><th>Surprise</th><th>Surprise %</th>
              </tr></thead><tbody>
                {ea.map((e,i)=>(
                  <tr key={i}>
                    <td style={{fontWeight:600}}>{e.period}</td>
                    <td>{fmt(e.actual,2)}</td>
                    <td>{fmt(e.estimate,2)}</td>
                    <td className={e.surprise>=0?"up":"dn"}>{e.surprise>=0?"+":""}{fmt(e.surprise,2)}</td>
                    <td className={e.surprisePercent>=0?"up":"dn"}>{e.surprisePercent>=0?"+":""}{fmt(e.surprisePercent,1)}%</td>
                  </tr>
                ))}
              </tbody></table>
            </div>
          )}
        </div>
      )}
      
      {detailTab==="peers"&&(
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
          {pr.length===0&&<div style={{color:"var(--dim)",fontSize:12,padding:20}}>Loading peers...</div>}
          {pr.map(p=>(
            <div key={p} onClick={()=>{setSelected(p);if(!allTickers.includes(p)){/* could auto-fetch */}}} 
              style={{padding:"6px 12px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:6,cursor:"pointer",fontFamily:"var(--mono)",fontSize:12,color:"var(--green)"}}>
              {p}
            </div>
          ))}
        </div>
      )}
      
      {detailTab==="recs"&&(
        <div>
          {rc.length===0&&<div style={{color:"var(--dim)",fontSize:12,padding:20,textAlign:"center"}}>Loading recommendations...</div>}
          {rc.length>0&&(
            <div className="tbl-wrap" style={{marginTop:4}}>
              <table><thead><tr>
                <th>Period</th><th style={{color:"var(--green)"}}>Buy</th><th style={{color:"var(--green)"}}>Strong Buy</th>
                <th>Hold</th><th style={{color:"var(--red)"}}>Sell</th><th style={{color:"var(--red)"}}>Strong Sell</th>
              </tr></thead><tbody>
                {rc.map((r,i)=>(
                  <tr key={i}>
                    <td style={{fontWeight:600}}>{r.period}</td>
                    <td className="up">{r.buy}</td><td className="up">{r.strongBuy}</td>
                    <td>{r.hold}</td>
                    <td className="dn">{r.sell}</td><td className="dn">{r.strongSell}</td>
                  </tr>
                ))}
              </tbody></table>
            </div>
          )}
        </div>
      )}
    </div>
    );
  };

  // ════════════════════════════════════════════════════════════
  // VIEWS
  // ════════════════════════════════════════════════════════════
  
  // PORTFOLIO
  const renderPortfolio=()=>(
    <>
      {loading&&<div className="progress-bar"><div className="progress-fill" style={{width:fetchPct+"%"}}/></div>}
      {loading&&<div style={{fontSize:11,color:"var(--gold)",fontFamily:"var(--mono)",marginBottom:8}}>{fetchMsg} ({fetchPct}%)</div>}
      
      <div className="stats-row">
        {[
          {k:"all",l:`TOTAL (${allTickers.length})`,s:calcStats(allTickers)},
          {k:"dividend",l:`DIVIDEND (${divTickers.length})`,s:calcStats(divTickers)},
          {k:"growth",l:`GROWTH (${grwTickers.length})`,s:calcStats(grwTickers)},
          {k:"digital",l:`DIGITAL (${dgtTickers.length})`,s:calcStats(dgtTickers)}
        ].map(p=>(
          <div key={p.k} className={clx("stat-card",filter===p.k&&"active")} onClick={()=>setFilter(p.k)}>
            <div className="stat-label">{p.l}</div>
            {p.s.loaded>0?(<>
              <div className={clx("stat-val",p.s.avgChg>=0?"up":"dn")}>{fmtPct(p.s.avgChg)}</div>
              <div className="stat-sub"><span className="up">{p.s.gainers}↑</span> / <span className="dn">{p.s.losers}↓</span> · {p.s.above200}/{p.s.loaded} above 200DMA</div>
            </>):<div style={{fontSize:12,color:"var(--dim)",fontFamily:"var(--mono)"}}>Loading...</div>}
          </div>
        ))}
      </div>
      
      {renderDetail()}
      
      <div className="toolbar">
        <input className="search" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search ticker, company, sector..."/>
        {["all","dividend","growth","digital"].map(f=>(
          <button key={f} className={clx("filter-btn",filter===f&&"active")} onClick={()=>setFilter(f)}>
            {f==="all"?"ALL":f==="dividend"?"DIV":f==="growth"?"GRW":"DGTL"}
          </button>
        ))}
        <button className="btn btn-sm" onClick={()=>setShowAddModal(true)}>+ Add Stock</button>
        <button className="btn-outline btn-sm" onClick={()=>fetchAll(true)} disabled={loading} style={{marginLeft:"auto"}}>
          {loading?"Loading...":"↻ Refresh"}
        </button>
        <span style={{fontSize:10,color:"var(--dim)",fontFamily:"var(--mono)"}}>{filtered.length} holdings</span>
      </div>
      
      <div className="tbl-wrap">
        <table>
          <thead><tr>
            {[["ticker","Symbol"],["price","Price"],["change","Chg %"],["pe","P/E"],["yield","Yield"],["mktcap","Mkt Cap"],["ticker","200DMA"],["sector","Sector"]].map(([k,l])=>(
              <th key={k+l} onClick={()=>handleSort(k)}>{l}{sortKey===k?(sortDir==="asc"?" ↑":" ↓"):""}</th>
            ))}
            <th>90D</th>
          </tr></thead>
          <tbody>
            {filtered.map(t=>{
              const d=stockData[t]||{};
              return(
                <tr key={t} className="row" onClick={()=>setSelected(t)}>
                  <td><div className="tk">{t}</div><div className="co">{d.name}</div></td>
                  <td style={{fontWeight:600}}>{d.hasData?"$"+fmt(d.price):<span style={{color:"var(--dim)"}}>—</span>}</td>
                  <td className={d.changePct>=0?"up":"dn"} style={{fontWeight:600}}>{d.hasData?fmtPct(d.changePct):"—"}</td>
                  <td style={{color:"var(--muted)"}}>{d.pe?fmt(d.pe,1):"—"}</td>
                  <td style={{color:d.divYield>2?"var(--gold)":"var(--muted)"}}>{d.divYield?fmt(d.divYield,2)+"%":"—"}</td>
                  <td style={{color:"var(--muted)"}}>{fmtMC(d.marketCap)}</td>
                  <td>{d.aboveSMA200!=null?<span className={d.aboveSMA200?"up":"dn"} style={{fontSize:10}}>{d.aboveSMA200?"▲ ABOVE":"▼ BELOW"}</span>:<span style={{color:"var(--dim)"}}>—</span>}</td>
                  <td><span className="badge badge-sector">{d.sector}</span></td>
                  <td><Spark data={d.sparkline} w={64} h={20} color={d.changePct>=0?"var(--green)":"var(--red)"}/></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </>
  );

  // NEWS
  const renderNews=()=>(
    <>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{fontSize:20,fontFamily:"var(--serif)"}}>Market News</h2>
        <button className="btn btn-sm" onClick={fetchMarketNews}>↻ Load News</button>
      </div>
      {marketNews.length===0&&<div style={{color:"var(--dim)",fontSize:13,padding:40,textAlign:"center"}}>Click "Load News" to fetch latest</div>}
      {marketNews.map((n,i)=>(
        <a key={i} href={n.url} target="_blank" rel="noreferrer" className="news-card">
          {n.image&&<img src={n.image} style={{width:"100%",height:120,objectFit:"cover",borderRadius:4,marginBottom:6}} onError={e=>e.target.style.display="none"}/>}
          <div className="news-title">{n.headline}</div>
          <div className="news-summary">{n.summary?.slice(0,200)}...</div>
          <div className="news-meta">{n.source} · {new Date(n.datetime*1000).toLocaleString()}</div>
        </a>
      ))}
    </>
  );

  // SCREENER
  const renderScreener=()=>(
    <>
      <h2 style={{fontSize:20,fontFamily:"var(--serif)",marginBottom:12}}>Stock Screener</h2>
      <div className="screener-filters">
        <input className="search" value={screenSearch} onChange={e=>setScreenSearch(e.target.value)} 
          placeholder="Search any stock (e.g. AAPL, Tesla, semiconductor...)" 
          onKeyDown={e=>e.key==="Enter"&&handleScreenerSearch()}
          style={{maxWidth:400}}/>
        <button className="btn btn-sm" onClick={handleScreenerSearch}>Search</button>
      </div>
      
      {screenResults.length>0&&(
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>Symbol</th><th>Name</th><th>Price</th><th>Chg%</th><th>P/E</th><th>Mkt Cap</th><th>Actions</th></tr></thead>
            <tbody>
              {screenResults.map(r=>{
                const sd=screenData[r.symbol];
                const inPort=allTickers.includes(r.symbol);
                return(
                  <tr key={r.symbol} className="row">
                    <td>
                      <div className="tk" onClick={async()=>{if(!sd)await fetchScreenerQuote(r.symbol)}}>{r.symbol}</div>
                    </td>
                    <td style={{fontSize:11,color:"var(--muted)",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis"}}>{r.description}</td>
                    <td style={{fontWeight:600}}>{sd?.quote?.c?"$"+fmt(sd.quote.c):<button className="btn-outline btn-sm" onClick={()=>fetchScreenerQuote(r.symbol)}>Load</button>}</td>
                    <td className={sd?.quote?.dp>=0?"up":"dn"}>{sd?.quote?.dp!=null?fmtPct(sd.quote.dp):"—"}</td>
                    <td style={{color:"var(--muted)"}}>{sd?.metric?.peTTM?fmt(sd.metric.peTTM,1):"—"}</td>
                    <td style={{color:"var(--muted)"}}>{sd?.metric?.marketCapitalization?fmtMC(sd.metric.marketCapitalization):"—"}</td>
                    <td>
                      {inPort?(
                        <button className="btn-outline btn-sm btn-danger" onClick={()=>removeStock(r.symbol)}>Remove</button>
                      ):(
                        <select onChange={e=>{if(e.target.value){addStock(r.symbol,e.target.value);e.target.value=""}}} defaultValue="" 
                          style={{padding:"4px 8px",borderRadius:4,border:"1px solid var(--greenDim)",background:"var(--greenDk)",color:"var(--green)",fontSize:10,cursor:"pointer"}}>
                          <option value="" disabled>+ Add to...</option>
                          <option value="dividend">Dividend</option>
                          <option value="growth">Growth</option>
                          <option value="digital">Digital</option>
                        </select>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
      
      {screenResults.length===0&&(
        <div style={{color:"var(--dim)",fontSize:13,padding:40,textAlign:"center",lineHeight:2}}>
          Search for any stock to view metrics and add to your portfolio.<br/>
          Try: AAPL, MSFT, GOOGL, META, AMZN, or search by name like "semiconductor"
        </div>
      )}
    </>
  );

  // SIGNALS
  const renderSignals=()=>(
    <>
      <div style={{marginBottom:16}}>
        <h2 style={{fontSize:20,fontFamily:"var(--serif)",marginBottom:4}}>Tactical Signals</h2>
        <p style={{color:"var(--muted)",fontSize:11,fontFamily:"var(--mono)"}}>IOWN rules: Trim above 200DMA + 25% from lows · Buy in 3 tranches at -20%, -25%, -30% drawdowns</p>
      </div>
      {["BUY","TRIM","WATCH"].map(type=>{
        const s=signals.filter(x=>x.type===type);
        if(!s.length)return null;
        const color=type==="BUY"?"var(--green)":type==="TRIM"?"var(--gold)":"var(--red)";
        const bg=type==="BUY"?"var(--greenDim)":type==="TRIM"?"var(--goldDim)":"var(--redDim)";
        return(
          <div key={type} className="detail" style={{marginBottom:12}}>
            <div style={{fontSize:11,color,letterSpacing:".1em",fontFamily:"var(--mono)",fontWeight:600,marginBottom:8}}>{type} SIGNALS ({s.length})</div>
            {s.map((sig,i)=>(
              <div key={i} className="sig-row" style={i===0?{borderTop:"none"}:{}}>
                <span className="sig-badge" style={{background:bg,color}}>{sig.type}</span>
                <span style={{fontWeight:700,color,fontFamily:"var(--mono)",width:50,cursor:"pointer"}} onClick={()=>{setSelected(sig.ticker);setView("portfolio")}}>{sig.ticker}</span>
                <span style={{color:"var(--muted)",fontSize:11,fontFamily:"var(--mono)"}}>{sig.reason}</span>
              </div>
            ))}
          </div>
        );
      })}
      {signals.length===0&&<div style={{color:"var(--dim)",fontSize:13,padding:40,textAlign:"center"}}>No signals — load data first</div>}
    </>
  );

  // SECTORS
  const renderSectors=()=>{
    const sd={};
    allTickers.forEach(t=>{const d=stockData[t];if(!d?.hasData)return;const s=d.sector;if(!sd[s])sd[s]={tks:[],sum:0};sd[s].tks.push(d);sd[s].sum+=d.changePct});
    const sectors=Object.entries(sd).map(([n,v])=>({name:n,avg:v.sum/v.tks.length,count:v.tks.length,tks:v.tks.sort((a,b)=>b.changePct-a.changePct)})).sort((a,b)=>b.avg-a.avg);
    return(
      <>
        <h2 style={{fontSize:20,fontFamily:"var(--serif)",marginBottom:14}}>Sector Breakdown</h2>
        <div className="sector-grid">
          {sectors.map(s=>(
            <div key={s.name} className="detail" style={{marginBottom:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:14,fontWeight:600}}>{s.name}</span>
                <span className={s.avg>=0?"up":"dn"} style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:13}}>{fmtPct(s.avg)}</span>
              </div>
              <div style={{fontSize:10,color:"var(--dim)",fontFamily:"var(--mono)",marginBottom:6}}>{s.count} holding{s.count!==1?"s":""}</div>
              {s.tks.map(d=>(
                <div key={d.ticker} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderTop:"1px solid var(--border)"}}>
                  <span style={{color:"var(--green)",fontFamily:"var(--mono)",fontSize:11,cursor:"pointer"}} onClick={()=>{setSelected(d.ticker);setView("portfolio")}}>{d.ticker}</span>
                  <span className={d.changePct>=0?"up":"dn"} style={{fontFamily:"var(--mono)",fontSize:11}}>{fmtPct(d.changePct)}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
        {sectors.length===0&&<div style={{color:"var(--dim)",fontSize:13,padding:40,textAlign:"center"}}>Load data to see sectors</div>}
      </>
    );
  };

  // AI RESEARCH
  const renderResearch=()=>(
    <div className="ai-panel">
      <h2 style={{fontSize:20,fontFamily:"var(--serif)",marginBottom:4}}>AI Research Assistant</h2>
      <p style={{color:"var(--muted)",fontSize:11,fontFamily:"var(--mono)",marginBottom:3}}>Ask anything about your holdings using IOWN's framework. Web search enabled for current data.</p>
      <p style={{color:"var(--dim)",fontSize:10,fontFamily:"var(--mono)",marginBottom:10}}>Try: "Which holdings are most vulnerable to AI disruption?" · "Draft a thesis for our energy positions" · "Compare our dividend vs growth performance"</p>
      <div style={{display:"flex",gap:8}}>
        <input className="ai-input" value={aiQuery} onChange={e=>setAiQuery(e.target.value)} placeholder="Ask about your portfolio..." onKeyDown={e=>e.key==="Enter"&&handleAI()}/>
        <button className="btn" onClick={handleAI} disabled={aiLoading}>{aiLoading?"Analyzing...":"Research"}</button>
      </div>
      {aiResp&&<div className="ai-resp">{aiResp}</div>}
    </div>
  );

  // ════════════════════════════════════════════════════════════
  // MAIN RENDER
  // ════════════════════════════════════════════════════════════
  return(
    <div className="app">
      {/* HEADER */}
      <header className="hdr">
        <div className="logo">
          <div className="logo-mark">IO</div>
          <div><div className="logo-text">IOWN Terminal</div><div className="logo-tag">Return on Intention</div></div>
        </div>
        <nav className="nav">
          {[{k:"portfolio",l:"Portfolio"},{k:"screener",l:"Screener"},{k:"news",l:"News"},{k:"signals",l:"Signals"},{k:"sectors",l:"Sectors"},{k:"research",l:"AI Research"}].map(v=>(
            <button key={v.k} className={clx("nav-btn",view===v.k&&"active")} onClick={()=>setView(v.k)}>{v.l}</button>
          ))}
        </nav>
        <div className="hdr-right">
          {loading&&<span style={{fontSize:10,color:"var(--gold)",fontFamily:"var(--mono)"}}>{fetchPct}%</span>}
          {!loading&&lastRefresh&&<span style={{fontSize:9,color:"var(--dim)",fontFamily:"var(--mono)"}}>Updated {new Date(lastRefresh).toLocaleTimeString()}</span>}
          <div className="clock">
            <div>{clock.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</div>
            <div style={{fontSize:8}}>{clock.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>
          </div>
          <span className="status-dot" style={{background:hasData?"var(--green)":"var(--gold)"}}></span>
          <button className="cfg-btn" onClick={()=>setShowConfig(!showConfig)}>⚙</button>
        </div>
      </header>

      {/* MAIN */}
      <main className="main">
        {/* Show deploy hint if no data after a few seconds */}
        {!hasData&&!loading&&view==="portfolio"&&(
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:20,marginBottom:16,textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:700,fontFamily:"var(--serif)",marginBottom:6}}>Deploy to Go Live</div>
            <p style={{color:"var(--muted)",fontSize:13,lineHeight:1.6,marginBottom:12}}>
              Upload this file to your <strong style={{color:"var(--green)"}}>IOWN-App-Terminal</strong> GitHub repo to enable live Finnhub data.
              The Claude preview sandbox blocks external API calls.
            </p>
            <p style={{color:"var(--dim)",fontSize:11,fontFamily:"var(--mono)"}}>
              Once deployed → richacarson.github.io/IOWN-App-Terminal → data loads automatically
            </p>
            <button className="btn" style={{marginTop:12}} onClick={()=>fetchAll(true)}>Try Loading Anyway</button>
          </div>
        )}
        {view==="portfolio"&&renderPortfolio()}
        {view==="screener"&&renderScreener()}
        {view==="news"&&renderNews()}
        {view==="signals"&&renderSignals()}
        {view==="sectors"&&renderSectors()}
        {view==="research"&&renderResearch()}
      </main>

      {/* ADD STOCK MODAL */}
      {showAddModal&&(
        <div className="modal-overlay" onClick={()=>setShowAddModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3 style={{fontFamily:"var(--serif)",fontSize:18,marginBottom:12}}>Add Stock to Portfolio</h3>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <input value={addTicker} onChange={e=>setAddTicker(e.target.value.toUpperCase())} placeholder="Ticker (e.g. AAPL)" 
                style={{flex:1,padding:"10px 14px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:14,fontFamily:"var(--mono)",outline:"none"}}
                onKeyDown={e=>{if(e.key==="Enter"&&addTicker){addStock(addTicker,addPortfolio);setAddTicker("");setShowAddModal(false)}}}/>
              <select value={addPortfolio} onChange={e=>setAddPortfolio(e.target.value)}
                style={{padding:"10px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:13}}>
                <option value="dividend">Dividend</option>
                <option value="growth">Growth</option>
                <option value="digital">Digital Assets</option>
              </select>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn" onClick={()=>{if(addTicker){addStock(addTicker,addPortfolio);setAddTicker("");setShowAddModal(false)}}}>Add</button>
              <button className="btn-outline btn-sm" onClick={()=>setShowAddModal(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* CONFIG PANEL */}
      {showConfig&&(
        <div className="config">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <h3 style={{fontFamily:"var(--serif)",fontSize:16}}>Configuration</h3>
            <button onClick={()=>setShowConfig(false)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:16}}>✕</button>
          </div>
          <div className="config-section">
            <div className="stat-label">STATUS</div>
            <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,fontFamily:"var(--mono)"}}>
              <span className="status-dot" style={{background:hasData?"var(--green)":"var(--gold)"}}></span>
              <span style={{color:hasData?"var(--green)":"var(--gold)"}}>
                {hasData?`Live — ${Object.keys(quotes).length} quotes loaded`:"Connecting..."}
              </span>
            </div>
          </div>
          <div className="config-section">
            <div className="stat-label">PORTFOLIO</div>
            <div style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--mono)",lineHeight:1.8}}>
              Dividend: {divTickers.length} · Growth: {grwTickers.length} · Digital: {dgtTickers.length} · Total: {allTickers.length}
            </div>
          </div>
          <div className="config-section">
            <div className="stat-label">TACTICAL RULES</div>
            <div style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--mono)",lineHeight:1.8}}>
              TRIM: Above 200DMA + 25% from lows<br/>BUY T1: -20% from 52W high<br/>BUY T2: -25% from 52W high<br/>BUY T3: -30% from 52W high
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexDirection:"column"}}>
            <button className="btn" onClick={()=>fetchAll(false)} disabled={loading}>Full Refresh (~4 min)</button>
            <button className="btn-outline btn-sm" onClick={()=>fetchAll(true)} disabled={loading}>Quick Refresh (~1 min)</button>
            <button className="btn-outline btn-sm" onClick={()=>{
              LS.set("quotes",{});LS.set("metrics",{});LS.set("candles",{});LS.set("profiles",{});
              setQuotes({});setMetrics({});setCandles({});setProfiles({});setLastRefresh(null);LS.set("lastRefresh",null);
            }} style={{borderColor:"var(--redDim)",color:"var(--red)"}}>Clear Cache</button>
            <button className="btn-outline btn-sm" onClick={()=>{
              setDivTickers(DEFAULT_DIVIDEND);setGrwTickers(DEFAULT_GROWTH);setDgtTickers(DEFAULT_DIGITAL);
            }} style={{borderColor:"var(--goldDim)",color:"var(--gold)"}}>Reset Portfolios</button>
          </div>
        </div>
      )}

      {/* FOOTER */}
      <footer className="ftr">
        <span>IOWN Terminal v3 · Intentional Ownership · Paradiem</span>
        <span>{hasData?`● LIVE · ${Object.keys(quotes).length}/${allTickers.length}`:"○ LOADING"} · Finnhub</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
